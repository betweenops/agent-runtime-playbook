<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="360" viewBox="0 0 1040 360">
  <rect width="1040" height="360" fill="#f7f4ed"/>
  <text x="50" y="42" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#1e293b">Agentic CLI Request Flow</text>
  <text x="50" y="68" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#475569">Local runtime on the left, remote provider and model on the right.</text>

  <rect x="50" y="110" width="180" height="82" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="143" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">User</text>
  <text x="140" y="167" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1e3a8a">Prompt in terminal</text>

  <rect x="290" y="95" width="220" height="112" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="128" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">Agentic CLI</text>
  <text x="400" y="152" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#166534">Builds request</text>
  <text x="400" y="172" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#166534">Assembles context</text>
  <text x="400" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#166534">Streams response</text>

  <rect x="290" y="235" width="220" height="72" rx="12" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="400" y="264" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#3f6212">Local Session Store</text>
  <text x="400" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#3f6212">History, metadata, state</text>

  <rect x="580" y="95" width="190" height="112" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="675" y="128" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">API Provider</text>
  <text x="675" y="152" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">Auth and quotas</text>
  <text x="675" y="172" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">Routing and usage</text>
  <text x="675" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">Streaming transport</text>

  <rect x="830" y="95" width="160" height="112" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="910" y="128" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#5b21b6">LLM Service</text>
  <text x="910" y="152" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b21b6">Tokenizer</text>
  <text x="910" y="172" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b21b6">Transformer</text>
  <text x="910" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b21b6">Token decoding</text>

  <line x1="230" y1="151" x2="290" y2="151" stroke="#334155" stroke-width="3"/>
  <polygon points="290,151 278,145 278,157" fill="#334155"/>

  <line x1="510" y1="151" x2="580" y2="151" stroke="#334155" stroke-width="3"/>
  <polygon points="580,151 568,145 568,157" fill="#334155"/>

  <line x1="770" y1="151" x2="830" y2="151" stroke="#334155" stroke-width="3"/>
  <polygon points="830,151 818,145 818,157" fill="#334155"/>

  <line x1="830" y1="182" x2="770" y2="182" stroke="#334155" stroke-width="3"/>
  <polygon points="770,182 782,176 782,188" fill="#334155"/>

  <line x1="580" y1="182" x2="510" y2="182" stroke="#334155" stroke-width="3"/>
  <polygon points="510,182 522,176 522,188" fill="#334155"/>

  <line x1="290" y1="182" x2="230" y2="182" stroke="#334155" stroke-width="3"/>
  <polygon points="230,182 242,176 242,188" fill="#334155"/>

  <line x1="400" y1="207" x2="400" y2="235" stroke="#334155" stroke-width="3"/>
  <polygon points="400,235 394,223 406,223" fill="#334155"/>

  <text x="542" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">request payload</text>
  <text x="802" y="138" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">model request</text>
  <text x="801" y="202" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">token stream</text>
  <text x="542" y="202" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">response stream</text>
  <text x="140" y="230" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#475569">You interact with the CLI locally (Codex, Claude Code, Open Code, Cursor, etc.).</text>
  <text x="140" y="250" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#475569">Inference happens remotely at the model service.</text>
</svg>
