<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="360" viewBox="0 0 1040 360">
  <rect width="1040" height="360" fill="#fffaf0"/>
  <text x="50" y="42" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Model Decoding Loop</text>
  <text x="50" y="68" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4b5563">Inference is iterative: the model predicts one more token based on the tokens seen so far.</text>

  <rect x="50" y="130" width="150" height="84" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="125" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#075985">Input Text</text>
  <text x="125" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#075985">Prompt and context</text>

  <rect x="245" y="130" width="150" height="84" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">Tokenizer</text>
  <text x="320" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#166534">Text to tokens</text>

  <rect x="440" y="130" width="160" height="84" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="520" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#5b21b6">Embeddings</text>
  <text x="520" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b21b6">Token vectors</text>

  <rect x="645" y="118" width="180" height="108" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="735" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">Transformer</text>
  <text x="735" y="173" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">Attention and layers</text>
  <text x="735" y="193" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">Compute logits</text>
  <text x="735" y="213" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">for next token</text>

  <rect x="870" y="130" width="140" height="84" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="940" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">Decoder</text>
  <text x="940" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#92400e">Pick next token</text>

  <line x1="200" y1="172" x2="245" y2="172" stroke="#334155" stroke-width="3"/>
  <polygon points="245,172 233,166 233,178" fill="#334155"/>

  <line x1="395" y1="172" x2="440" y2="172" stroke="#334155" stroke-width="3"/>
  <polygon points="440,172 428,166 428,178" fill="#334155"/>

  <line x1="600" y1="172" x2="645" y2="172" stroke="#334155" stroke-width="3"/>
  <polygon points="645,172 633,166 633,178" fill="#334155"/>

  <line x1="825" y1="172" x2="870" y2="172" stroke="#334155" stroke-width="3"/>
  <polygon points="870,172 858,166 858,178" fill="#334155"/>

  <path d="M940 214 C940 300, 320 300, 320 214" fill="none" stroke="#334155" stroke-width="3"/>
  <polygon points="320,214 326,226 314,226" fill="#334155"/>

  <text x="630" y="318" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4b5563">Append the selected token to the sequence, then run the loop again until stopping criteria are met.</text>
</svg>
