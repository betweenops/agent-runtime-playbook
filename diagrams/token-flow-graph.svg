<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect width="1120" height="680" fill="#f8fafc"/>

  <text x="40" y="44" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Agentic Workflow as a Directed Graph</text>
  <text x="40" y="70" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#475569">Nodes are systems. Edges are what flows between them. Token categories label the edges so you can see where each one is paid.</text>

  <!-- Legend -->
  <rect x="40" y="92" width="1040" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="64" cy="116" r="6" fill="#1d4ed8"/><text x="78" y="121" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1e293b">input tokens (what the model sees)</text>
  <circle cx="304" cy="116" r="6" fill="#7c3aed"/><text x="318" y="121" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1e293b">output tokens (what the model generates)</text>
  <circle cx="592" cy="116" r="6" fill="#0e7490"/><text x="606" y="121" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1e293b">cached tokens (reused prefix)</text>
  <circle cx="816" cy="116" r="6" fill="#b45309"/><text x="830" y="121" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1e293b">reasoning tokens (extra inference)</text>

  <!-- Nodes -->
  <!-- User -->
  <rect x="60" y="280" width="160" height="80" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#075985">User</text>
  <text x="140" y="335" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#075985">prompt in terminal</text>

  <!-- Agentic CLI -->
  <rect x="330" y="240" width="240" height="160" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Agentic CLI</text>
  <text x="450" y="296" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#166534">Codex · Claude Code · Open Code</text>
  <text x="450" y="314" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#166534">Cursor · Copilot Chat · etc.</text>
  <line x1="350" y1="328" x2="550" y2="328" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="450" y="348" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#166534">assemble context · run tools</text>
  <text x="450" y="366" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#166534">stream output · persist state</text>
  <text x="450" y="386" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#166534">decide tool vs. answer loop</text>

  <!-- Session Store -->
  <rect x="330" y="468" width="240" height="76" rx="14" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="450" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#3f6212">Local Session Store</text>
  <text x="450" y="520" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#3f6212">history · metadata · resumable state</text>

  <!-- Tools -->
  <rect x="60" y="468" width="200" height="76" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="160" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e">Tools</text>
  <text x="160" y="520" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#92400e">shell · file · search · APIs</text>

  <!-- Provider -->
  <rect x="680" y="240" width="200" height="160" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="780" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">API Provider</text>
  <text x="780" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#991b1b">auth · quotas</text>
  <text x="780" y="318" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#991b1b">routing · metering</text>
  <text x="780" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#991b1b">streaming transport</text>
  <text x="780" y="358" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#991b1b">prompt cache lookup</text>
  <text x="780" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#991b1b">usage accounting</text>

  <!-- Model -->
  <rect x="940" y="240" width="160" height="160" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1020" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#5b21b6">Model</text>
  <text x="1020" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b21b6">tokenize</text>
  <text x="1020" y="318" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b21b6">transformer</text>
  <text x="1020" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b21b6">decode loop</text>
  <text x="1020" y="358" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b21b6">emit one token</text>
  <text x="1020" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b21b6">at a time</text>

  <!-- Edges -->
  <!-- User -> CLI: prompt -->
  <line x1="220" y1="312" x2="330" y2="312" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="275" y="302" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1d4ed8">prompt</text>

  <!-- CLI -> User: rendered answer -->
  <line x1="330" y1="340" x2="220" y2="340" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="275" y="358" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7c3aed">streamed answer</text>

  <!-- CLI -> Provider: input tokens -->
  <line x1="570" y1="290" x2="680" y2="290" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="625" y="278" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1d4ed8">request payload</text>
  <text x="625" y="294" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1d4ed8" font-style="italic">instructions + history + tools</text>

  <!-- Provider -> CLI: token stream -->
  <line x1="680" y1="350" x2="570" y2="350" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="625" y="368" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7c3aed">token stream</text>
  <text x="625" y="382" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7c3aed" font-style="italic">+ usage block</text>

  <!-- Provider -> Model: routed input -->
  <line x1="880" y1="290" x2="940" y2="290" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="910" y="278" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#1d4ed8">input</text>

  <!-- Model -> Provider: output tokens -->
  <line x1="940" y1="350" x2="880" y2="350" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="910" y="368" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7c3aed">output</text>

  <!-- Cached tokens (under Model->Provider) -->
  <text x="910" y="220" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0e7490">cached prefix reused →</text>
  <line x1="820" y1="226" x2="940" y2="226" stroke="#0e7490" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Reasoning tokens inside Model -->
  <text x="1020" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#b45309">+ reasoning tokens (internal)</text>

  <!-- CLI <-> Tools -->
  <line x1="370" y1="400" x2="200" y2="468" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
  <text x="220" y="430" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#b45309">tool call</text>

  <line x1="220" y1="468" x2="400" y2="400" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="340" y="462" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16a34a">tool result → next turn's input</text>

  <!-- CLI <-> Session -->
  <line x1="430" y1="400" x2="430" y2="468" stroke="#65a30d" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="396" y="438" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#65a30d">persist</text>
  <line x1="470" y1="468" x2="470" y2="400" stroke="#65a30d" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="504" y="438" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#65a30d">replay</text>

  <!-- Bottom annotations -->
  <text x="40" y="600" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Reading the graph</text>
  <text x="40" y="622" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">1. Input tokens flow right: everything the model sees was packaged by the CLI from your prompt, history, tool output, and instructions.</text>
  <text x="40" y="640" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">2. Output tokens flow left: the model emits one at a time, the provider streams them back, the CLI renders them, and they also become history for the next turn.</text>
  <text x="40" y="658" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">3. Tool results re-enter the input loop. The session store lets later turns rebuild context. Cached and reasoning tokens are accounting fields, not separate flows.</text>
</svg>
